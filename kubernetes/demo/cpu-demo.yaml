apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-demo
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-demo
  template:
    metadata:
      labels:
        app: cpu-demo
    spec:
      containers:
        - name: cpu-demo
          image: registry.k8s.io/hpa-example:1.0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-demo
  namespace: demo
spec:
  selector:
    app: cpu-demo
  ports:
    - name: http
      port: 80
      targetPort: 80
